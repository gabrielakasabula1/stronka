<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Gabriela Kasabuła</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5eee6;
    color:#4b2e2e;
    text-align:center;
}

/* nagłówek */
header{
    background:#5c3a21;
    color:#fff7f0;
    padding:40px 20px;
}

header h1{
    margin:0;
    font-size:36px;
    letter-spacing:2px;
}

header p{
    margin-top:10px;
    font-style:italic;
    color:#e6d2c3;
}

/* główna treść */
main{
    padding:50px 20px;
}

blockquote{
    font-size:20px;
    font-style:italic;
    margin:30px auto;
    max-width:600px;
    color:#6b4226;
}

/* stopka */
footer{
    background:#3b2416;
    color:#e6d2c3;
    padding:20px;
    font-size:14px;
}

footer span{
    display:block;
    margin-top:5px;
    opacity:0.8;
}

</style>

</head>

<body>

<header>
<h1>Gabriela Kasabuła</h1>
<p>małe miejsce w internecie na jedną myśl dziennie</p>
</header>

<main>

<h2>Myśl na dziś</h2>

<blockquote>
„Małe kroki każdego dnia prowadzą do wielkich zmian.”
</blockquote>

</main>

<footer>
Dzień dobry, świecie 🌿  
<span>© 2026 • Strona utrzymana w odcieniach brązu</span>
</footer>

</body>

</html>
